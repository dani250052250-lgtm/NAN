<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Night City</title>

  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .moon {
      width: 120px;
      height: 120px;
      background: #ffd700;
      border-radius: 50%;
      margin: 40px auto;
      box-shadow: 0 0 40px #ffd700;
    }

    .neighborhood {
      width: 100%;
      height: 200px;
      background: linear-gradient(to top, #111, #333);
      position: fixed;
      bottom: 0;
    }

    .title {
      font-size: 40px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="moon"></div>

<h1 class="title">
Nights<br>
Among the<br>
Neighborhoods
</h1>

<div class="neighborhood"></div>

<audio autoplay loop>
  <source src="lullaby.mp3" type="audio/mpeg">
</audio>

</body>
</html>
